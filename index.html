<title>Viagem Europa · privado</title>

<style>
:root{--gold:#b8892b;--ink:#1c1a17}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px;
 font-family:Inter,system-ui,-apple-system,sans-serif;color:#f3ede0;
 background:radial-gradient(1200px 600px at 50% -10%,#2b2620,#14120f 70%)}
.card{width:100%;max-width:360px;text-align:center;background:rgba(255,255,255,.04);
 border:1px solid rgba(184,137,43,.35);border-radius:18px;padding:34px 26px;backdrop-filter:blur(6px)}
.lock{font-size:34px;margin-bottom:8px}
h1{font-family:Fraunces,serif;font-weight:600;font-size:26px;color:#f6edda;letter-spacing:.2px}
.sub{font-size:13px;color:#b9ad97;margin:6px 0 22px}
input{width:100%;padding:13px 15px;border-radius:11px;border:1px solid rgba(184,137,43,.4);
 background:#0f0d0b;color:#fff;font-size:16px;outline:none}
input:focus{border-color:var(--gold)}
button{width:100%;margin-top:12px;padding:13px;border:0;border-radius:11px;cursor:pointer;
 background:linear-gradient(180deg,#cf9d38,#a8791f);color:#1c1408;font-weight:700;font-size:15px;font-family:Inter}
button:active{transform:translateY(1px)}
#err{min-height:18px;margin-top:12px;font-size:13px;color:#f0a3a3}
.foot{margin-top:18px;font-size:11px;color:#7d7360;line-height:1.5}
</style>
</head>
<body>
<form class="card" id="f" autocomplete="off">
 <div class="lock">🔒</div>
 <h1>Viagem Europa</h1>
 <div class="sub">Luiz &amp; Renata · conteúdo privado</div>
 <input id="pw" type="password" placeholder="Senha" autocomplete="current-password" autofocus>
 <button type="submit">Entrar</button>
 <div id="err"></div>
 <div class="foot">Passagens, hotéis e documentos.<br>Protegido por criptografia AES.</div>
</form>

async function unlock(pw){
 var raw=atob(CIPHER), blob=new Uint8Array(raw.length);
 for(var i=0;i<raw.length;i++) blob[i]=raw.charCodeAt(i);
 var salt=blob.slice(0,16), iv=blob.slice(16,28), data=blob.slice(28);
 var km=await crypto.subtle.importKey("raw",ENC.encode(pw),"PBKDF2",false,["deriveKey"]);
 var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
 var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,data);
 return new TextDecoder().decode(pt);
}
function show(html){document.open();document.write(html);document.close();}
document.getElementById("f").addEventListener("submit",async function(e){
 e.preventDefault();
 var pw=document.getElementById("pw").value, err=document.getElementById("err");
 err.textContent="Abrindo…";
 try{ var html=await unlock(pw); try{sessionStorage.setItem("vk",pw);}catch(_){}; show(html); }
 catch(_){ err.textContent="Senha incorreta."; }
});
(async function(){ try{ var k=sessionStorage.getItem("vk"); if(k){ show(await unlock(k)); } }catch(_){ try{sessionStorage.removeItem("vk");}catch(e){} } })();
